  caddy:
    image: docker.io/caddy:2.11.2
    container_name: caddy
    hostname: caddy
    networks: [homenet]
    user: "65534:65534"
    restart: always
    <<: [*default-dns, *default-security]
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - "./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro"
      - "/opt/caddy/data:/data"
      - "/opt/caddy/config:/config"
    ports:
      - "80:80"
      - "443:443"
