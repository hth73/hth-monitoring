[server]
  protocol = http
  http_port = 3001
  domain = htdom.local
  root_url = https://grafana.htdom.local

[users]
viewers_can_edit = true ;Allow users to see the Explore Tab (Logs)

[analytics]
  check_for_updates = true

[auth]
  disable_login_form = false
  oauth_auto_login = false
  login_cookie_name = grafana_session
  oauth_state_cookie_max_age = 60
  enable_login_token = true
  oauth_allow_insecure_email_lookup=true

[security]
  cookie_secure = true
  cookie_samesite = lax

[auth.basic]
  enabled = false

[log]
  mode = console file
  level = error

[log.console]
  level = error
  format = console

[log.file]
  level = error
  format = text
  log_rotate = true
  max_lines = 1000000
  max_size_shift = 28
  daily_rotate = true
  max_days = 7

